openapi: 3.0.0

info:
  title: Company API
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: local server

tags:
  - name: Companies
    description: Company endpoints

  - name: Employees
    description: Employee endpoints

paths:
  /companies:
    get:
      tags:
        - Companies
      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
          example: BAE
        - in: query
          name: page
          required: false
          schema:
            type: integer
          example: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
          example: 10
      responses:
        '200':
          description: List of companies
          content:
            application/json:
              example:
                total: 42
                page: 1
                totalPages: 5
                data:
                  - id: 1
                    name: BAE
                    email: contact@bae.com
                    address: KHBP
        '404':
          description: No companies found
          content:
            application/json:
              example:
                error: No companies found matching your search
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                error: Internal server error

    post:
      tags:
        - Companies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: SwaggerDefault
                email:
                  type: string
                  format: email
                  example: swagger@contact.com
                address:
                  type: string
                  example: KHBP
      responses:
        '201':
          description: Company created successfully
          content:
            application/json:
              example:
                id: 1
                name: SwaggerDefault
                email: swagger@contact.com
                address: KHBP
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                error: Internal server error

  /companies/{id}:
    get:
      tags:
        - Companies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Company found
          content:
            application/json:
              example:
                id: 1
                name: BAE
                email: contact@bae.com
                address: KHBP
        '404':
          description: Company not found
          content:
            application/json:
              example:
                error: Company not found
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                error: Internal server error

    put:
      tags:
        - Companies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                address:
                  type: string
      responses:
        '200':
          description: Company updated successfully
          content:
            application/json:
              example:
                id: 1
                name: Updated Company
                email: updated@company.com
                address: New Address
        '404':
          description: Company not found
          content:
            application/json:
              example:
                error: Company not found
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                error: Internal server error

    delete:
      tags:
        - Companies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Company deleted successfully
        '404':
          description: Company not found
          content:
            application/json:
              example:
                error: Company not found
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                error: Internal server error

  /employees:
    get:
      tags:
        - Employees
      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
          example: Mousa
        - in: query
          name: offset
          required: false
          schema:
            type: integer
          example: 0
        - in: query
          name: limit
          required: false
          schema:
            type: integer
          example: 10
      responses:
        '200':
          description: List of employees
          content:
            application/json:
              example:
                total: 30
                offset: 0
                limit: 10
                data:
                  - id: 1
                    name: Mousa Estefan
                    email: mousa@test.com
                    company_id: 1
        '404':
          description: No employees found matching the search criteria
          content:
            application/json:
              example:
                error: No employees found matching your search
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                error: Internal server error

    post:
      tags:
        - Employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - company_id
              properties:
                name:
                  type: string
                  example: Mousa Estefan
                email:
                  type: string
                  format: email
                  example: mousa@test.com
                company_id:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Employee created successfully
          content:
            application/json:
              example:
                id: 1
                name: Mousa Estefan
                email: mousa@test.com
                company_id: 1
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                error: Internal server error

  /employees/{id}:
    get:
      tags:
        - Employees
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Employee found
          content:
            application/json:
              example:
                id: 1
                name: Mousa Estefan
                email: mousa@test.com
                company_id: 1
        '404':
          description: Employee not found
          content:
            application/json:
              example:
                error: Employee not found
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                error: Internal server error

    put:
      tags:
        - Employees
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                company_id:
                  type: integer
      responses:
        '200':
          description: Employee updated successfully
          content:
            application/json:
              example:
                id: 1
                name: Updated Employee
                email: updated@test.com
                company_id: 1
        '404':
          description: Employee not found
          content:
            application/json:
              example:
                error: Employee not found
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                error: Internal server error

    delete:
      tags:
        - Employees
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Employee deleted successfully
        '404':
          description: Employee not found
          content:
            application/json:
              example:
                error: Employee not found
        '500':
          description: Internal server error
          content:
            application/json:
              example:
                error: Internal server error
